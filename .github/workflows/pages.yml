name: Deploy Pages

# Builds and deploys the showcase site (gh-pages/) to GitHub Pages via Actions.
# Pages source is configured as "GitHub Actions" — this workflow is the deploy.
# Path-filtered to the site folder so app/CI changes don't trigger a redeploy.

on:
  push:
    branches: [main]
    paths:
      - 'gh-pages/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

# Workflow default is read-only; the deploy job alone elevates to
# pages:write + id-token:write so the lint job (which runs npm-fetched
# prettier) never holds Pages-deploy or OIDC rights.
permissions:
  contents: read

# One in-flight Pages deploy at a time; don't cancel a running deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  lint:
    name: Lint site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'

      - name: Prettier format check (HTML/CSS/JS)
        # Exact pin — `prettier@3` floats to whatever npm serves at run time.
        run: npx --yes prettier@3.8.4 --check "gh-pages/**/*.{html,css,js}"

      - name: JS syntax check
        run: node --check gh-pages/main.js

  deploy:
    name: Deploy to Pages
    needs: lint
    runs-on: ubuntu-latest
    # deploy-pages needs pages:write + id-token:write — scoped to this job only.
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Configure Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      - name: Upload site artifact (gh-pages/ only)
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: gh-pages

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
