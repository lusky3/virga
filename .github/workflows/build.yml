name: Build

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: this workflow only builds and uploads artifacts.
permissions:
  contents: read

env:
  RCLONE_VERSION: v1.74.2
  NDK_VERSION: 27.2.12479018

jobs:
  build:
    runs-on: ubuntu-latest
    # The `dev` environment holds the debug-keystore + debug OAuth client-ID
    # secrets. It has no protection rules, so this doesn't gate PR builds. Fork
    # PRs don't receive the secrets — the steps below degrade gracefully and the
    # build falls back to AGP's default debug keystore.
    environment: dev
    steps:
      - uses: actions/checkout@v4
        with:
          # SonarCloud needs full history for accurate blame/new-code detection.
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'

      - name: Set up Android SDK
        # SEC-F2: third-party action pinned to a commit SHA (not a mutable tag).
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3.2.2

      - name: Install NDK
        run: sdkmanager "ndk;${NDK_VERSION}"

      - name: Cache rclone build
        uses: actions/cache@v4
        with:
          path: .rclone-build
          key: rclone-${{ env.RCLONE_VERSION }}-ndk${{ env.NDK_VERSION }}

      - name: Build rclone binaries
        run: ./scripts/build-rclone.sh

      - name: Decode debug keystore
        # The dev environment stores the shared debug keystore (base64) so CI
        # debug APKs carry the stable debug signature the registered OAuth
        # clients and debug assetlinks expect. Skipped on fork PRs (no secret),
        # where the build falls back to AGP's throwaway debug keystore.
        if: env.HAS_DEBUG_KEYSTORE == 'true'
        env:
          HAS_DEBUG_KEYSTORE: ${{ secrets.RELEASE_KEYSTORE_BASE64 != '' }}
          KEYSTORE_B64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/keystore"
          printf '%s' "$KEYSTORE_B64" | base64 -d > "$RUNNER_TEMP/keystore/debug.jks"
          # Only the (non-sensitive) path goes to $GITHUB_ENV; the passwords are
          # injected straight into the build step's env from secrets.
          echo "VIRGA_DEBUG_KEYSTORE_FILE=$RUNNER_TEMP/keystore/debug.jks" >> "$GITHUB_ENV"

      - name: Build FOSS debug APKs
        # Debug OAuth client IDs + debug-keystore signing come from the dev
        # environment so the artifact is installable with working OAuth. The
        # debug keystore password is the well-known `android`, not a real secret.
        env:
          VIRGA_OAUTH_CLIENT_ID_GDRIVE: ${{ secrets.OAUTH_CLIENT_ID_GDRIVE }}
          VIRGA_OAUTH_CLIENT_ID_ONEDRIVE: ${{ secrets.OAUTH_CLIENT_ID_ONEDRIVE }}
          VIRGA_OAUTH_CLIENT_ID_DROPBOX: ${{ secrets.OAUTH_CLIENT_ID_DROPBOX }}
          VIRGA_DEBUG_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          VIRGA_DEBUG_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          VIRGA_DEBUG_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: ./gradlew assembleFossDebug

      - name: Unit tests + coverage
        # koverXmlReport runs every module's unit tests (incl. the library
        # modules' testDebugUnitTest, which a bare testFossDebugUnitTest misses)
        # and emits the aggregated JaCoCo-format report Codecov + Sonar consume.
        run: ./gradlew koverXmlReport

      - name: Lint
        run: ./gradlew lintFossDebug

      - name: Upload coverage to Codecov
        if: ${{ env.HAS_CODECOV == 'true' }}
        env:
          HAS_CODECOV: ${{ secrets.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: build/reports/kover/report.xml
          fail_ci_if_error: false

      - name: SonarCloud analysis
        # Reuses the already-compiled classes + the Kover XML (path configured in
        # the root build.gradle.kts). Skipped when no token (e.g. fork PRs).
        if: ${{ env.HAS_SONAR == 'true' }}
        env:
          HAS_SONAR: ${{ secrets.SONAR_TOKEN != '' }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: ./gradlew sonar --info

      - name: Snyk dependency scan
        # Reuses the configured Gradle project (Android SDK already set up). Reports
        # high-severity dependency CVEs and sends a snapshot to Snyk. Non-blocking
        # for now (|| true) so transitive CVEs don't wall the build; tighten by
        # dropping the `|| true` on `snyk test` once the baseline is triaged.
        if: ${{ env.HAS_SNYK == 'true' }}
        env:
          HAS_SNYK: ${{ secrets.SNYK_TOKEN != '' }}
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          npm install -g snyk
          snyk test --all-sub-projects --severity-threshold=high || true
          snyk monitor --all-sub-projects || true

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: foss-debug-apks
          path: app/build/outputs/apk/foss/debug/*.apk

  secret-scan:
    # GitGuardian secret scanning over the commit range. Independent of the build
    # so it runs in parallel. Needs full history. The token is a repo-level secret
    # (this job has no environment); skipped when absent, e.g. on fork PRs.
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || github.event_name == 'pull_request' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: GitGuardian scan
        # ggshield auto-detects the push/PR commit range from the GitHub context;
        # it only needs the API key. Skipped when the repo-level token is absent.
        if: ${{ env.HAS_GG == 'true' }}
        uses: GitGuardian/ggshield-action@v1
        env:
          HAS_GG: ${{ secrets.GIT_GUARDIAN_TOKEN != '' }}
          GITGUARDIAN_API_KEY: ${{ secrets.GIT_GUARDIAN_TOKEN }}

  notify-failure:
    # Ping Discord when CI breaks on main (push only — PR failures are the
    # author's to see, not channel noise). Runs after the gating jobs regardless
    # of their result and fires only if one failed.
    needs: [build, secret-scan]
    if: ${{ always() && github.event_name == 'push' && (needs.build.result == 'failure' || needs.secret-scan.result == 'failure') }}
    runs-on: ubuntu-latest
    steps:
      - name: Notify Discord — CI failed
        if: ${{ env.HAS_DISCORD == 'true' }}
        env:
          HAS_DISCORD: ${{ secrets.DISCORD_WEBHOOK_URL != '' }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          set -euo pipefail
          run_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          payload=$(jq -n --arg t "❌ CI failed on main" --arg u "$run_url" \
            --arg d "Commit ${GITHUB_SHA:0:7} by $GITHUB_ACTOR" \
            '{embeds:[{title:$t,url:$u,description:$d,color:15158332}]}')
          curl -fsS -H "Content-Type: application/json" -X POST "$DISCORD_WEBHOOK_URL" -d "$payload"

  rclone-update-check:
    # Weekly check for a newer rclone release; opens nothing automatically here,
    # just surfaces the latest tag in the job summary for a maintainer to bump.
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Latest rclone release
        run: |
          latest=$(curl -fsSL https://api.github.com/repos/rclone/rclone/releases/latest | jq -r .tag_name)
          echo "Latest rclone: $latest (pinned: ${RCLONE_VERSION})" >> "$GITHUB_STEP_SUMMARY"
