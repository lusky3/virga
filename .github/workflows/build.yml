name: Build

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: this workflow only builds and uploads artifacts.
permissions:
  contents: read

env:
  RCLONE_VERSION: v1.74.2
  NDK_VERSION: 27.2.12479018

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'

      - name: Set up Android SDK
        # SEC-F2: third-party action pinned to a commit SHA (not a mutable tag).
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3.2.2

      - name: Install NDK
        run: sdkmanager "ndk;${NDK_VERSION}"

      - name: Cache rclone build
        uses: actions/cache@v4
        with:
          path: .rclone-build
          key: rclone-${{ env.RCLONE_VERSION }}-ndk${{ env.NDK_VERSION }}

      - name: Build rclone binaries
        run: ./scripts/build-rclone.sh

      - name: Build FOSS debug APKs
        run: ./gradlew assembleFossDebug

      - name: Unit tests
        run: ./gradlew testFossDebugUnitTest

      - name: Lint
        run: ./gradlew lintFossDebug

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: foss-debug-apks
          path: app/build/outputs/apk/foss/debug/*.apk

  rclone-update-check:
    # Weekly check for a newer rclone release; opens nothing automatically here,
    # just surfaces the latest tag in the job summary for a maintainer to bump.
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Latest rclone release
        run: |
          latest=$(curl -fsSL https://api.github.com/repos/rclone/rclone/releases/latest | jq -r .tag_name)
          echo "Latest rclone: $latest (pinned: ${RCLONE_VERSION})" >> "$GITHUB_STEP_SUMMARY"
