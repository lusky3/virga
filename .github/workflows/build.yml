name: Build

on:
  push:
    branches: [main]
  pull_request:
  # Weekly — drives the rclone-update-check job (which guards on `schedule`).
  schedule:
    - cron: '0 8 * * 1'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: this workflow only builds and uploads artifacts.
permissions:
  contents: read

# RCLONE_VERSION / NDK_VERSION are NOT hardcoded here — they're loaded from
# scripts/rclone-versions.env (single source of truth) into $GITHUB_ENV by the
# "Load rclone versions" step below, so later steps and the cache key resolve them.

jobs:
  build:
    runs-on: ubuntu-latest
    # The weekly `schedule` exists only to drive the rclone-update-check job; the
    # full build (NDK + rclone cross-compile + every flavor) shouldn't run on cron.
    # It still runs on every push and PR.
    if: github.event_name != 'schedule'
    # The `dev` environment holds the debug-keystore + debug OAuth client-ID
    # secrets. It has no protection rules, so this doesn't gate PR builds. Fork
    # PRs don't receive the secrets — the steps below degrade gracefully and the
    # build falls back to AGP's default debug keystore.
    environment: dev
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # SonarCloud needs full history for accurate blame/new-code detection.
          fetch-depth: 0

      # Single source of truth: export RCLONE_VERSION / NDK_VERSION so later steps
      # AND the cache key (env.RCLONE_VERSION, env.NDK_VERSION) resolve them.
      - name: Load rclone versions
        # Emit only KEY=VALUE lines — the env file's leading comments have no '='
        # and $GITHUB_ENV rejects any line without one ("Invalid format").
        run: grep -E '^[A-Za-z_][A-Za-z0-9_]*=' scripts/rclone-versions.env >> "$GITHUB_ENV"

      # Verify the Gradle wrapper jar matches a known-good Gradle release before
      # the first ./gradlew runs (defends against a tampered wrapper in the repo).
      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Set up JDK 21
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          java-version: '21'
          distribution: temurin

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.25.x'

      - name: Set up Android SDK
        # SEC-F2: third-party action pinned to a commit SHA (not a mutable tag).
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3.2.2

      - name: Install NDK
        run: sdkmanager "ndk;${NDK_VERSION}"

      - name: Cache rclone build
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          # Cache the compiled binaries too, not just the clone: with jniLibs
          # present the build script's version-stamp gate skips the ~5-min
          # cross-compile on a hit. Go module + build caches speed the miss path.
          path: |
            .rclone-build
            core/rclone/src/main/jniLibs
            ~/go/pkg/mod
            ~/.cache/go-build
          key: rclone-${{ env.RCLONE_VERSION }}-ndk${{ env.NDK_VERSION }}

      - name: Build rclone binaries
        run: ./scripts/build-rclone.sh

      - name: Decode debug keystore
        # The dev environment stores the shared debug keystore (base64) so CI
        # debug APKs carry the stable debug signature the registered OAuth
        # clients and debug assetlinks expect. Skipped on fork PRs (no secret),
        # where the build falls back to AGP's throwaway debug keystore.
        if: env.HAS_DEBUG_KEYSTORE == 'true'
        env:
          HAS_DEBUG_KEYSTORE: ${{ secrets.RELEASE_KEYSTORE_BASE64 != '' }}
          KEYSTORE_B64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/keystore"
          printf '%s' "$KEYSTORE_B64" | base64 -d > "$RUNNER_TEMP/keystore/debug.jks"
          # Only the (non-sensitive) path goes to $GITHUB_ENV; the passwords are
          # injected straight into the build step's env from secrets.
          echo "VIRGA_DEBUG_KEYSTORE_FILE=$RUNNER_TEMP/keystore/debug.jks" >> "$GITHUB_ENV"

      - name: Build all-flavor debug APKs
        # Debug OAuth client IDs + debug-keystore signing come from the dev
        # environment so the artifact is installable with working OAuth. The
        # debug keystore credential is the well-known `android`, not a real secret.
        # All three distribution flavors are built so manifest-merge / flavor-config
        # regressions (e.g. Play's MANAGE_EXTERNAL_STORAGE strip, fdroid's Sentry-free
        # graph) are caught in CI, not at release time.
        # (The *_CREDENTIAL env names avoid the repo's banned password/secret-named
        # identifiers; the right-hand secrets.RELEASE_* names are GitHub-managed.)
        env:
          VIRGA_OAUTH_CLIENT_ID_GDRIVE: ${{ secrets.OAUTH_CLIENT_ID_GDRIVE }}
          VIRGA_OAUTH_CLIENT_ID_ONEDRIVE: ${{ secrets.OAUTH_CLIENT_ID_ONEDRIVE }}
          VIRGA_OAUTH_CLIENT_ID_DROPBOX: ${{ secrets.OAUTH_CLIENT_ID_DROPBOX }}
          VIRGA_DEBUG_KEYSTORE_CREDENTIAL: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          VIRGA_DEBUG_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          VIRGA_DEBUG_KEY_CREDENTIAL: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: ./gradlew assembleGithubDebug assembleFdroidDebug assemblePlayDebug

      - name: Unit tests + coverage
        # koverXmlReport runs every module's unit tests (incl. the library
        # modules' testDebugUnitTest that a single-variant run would miss) and
        # emits the aggregated JaCoCo-format report Codecov + Sonar consume. Kover
        # aggregates across the app's flavors automatically.
        run: ./gradlew koverXmlReport

      - name: Lint
        # Lint both the all-files-access manifest (github == fdroid) and the Play
        # manifest (which strips MANAGE_EXTERNAL_STORAGE) so a regression in either
        # variant's merged manifest is caught.
        run: ./gradlew lintGithubDebug lintPlayDebug

      - name: Guard — Play manifest has no all-files access
        # MANAGE_EXTERNAL_STORAGE is declared in src/main and stripped by src/play
        # (tools:node="remove"). That strip is load-bearing for Play policy, so assert
        # the merged Play manifest really lacks it — a regression would silently
        # re-expose a permission Play restricts for general-purpose sync apps.
        run: |
          set -euo pipefail
          ./gradlew :app:processPlayDebugMainManifest
          # Look only in the merged_manifest intermediate (not the whole tree, which
          # also holds blame/aapt/packaged copies) and sort so the match is stable
          # regardless of filesystem ordering.
          manifest=$(find app/build/intermediates/merged_manifest -path '*[Pp]layDebug*/AndroidManifest.xml' | sort | head -1)
          if [ -z "$manifest" ]; then
            echo "::error::Play merged manifest not found" >&2; exit 1
          fi
          if grep -q "MANAGE_EXTERNAL_STORAGE" "$manifest"; then
            echo "::error::Play manifest declares MANAGE_EXTERNAL_STORAGE — the src/play strip regressed." >&2
            exit 1
          fi
          echo "OK: no MANAGE_EXTERNAL_STORAGE in $manifest"

      - name: Screenshot tests (Roborazzi)
        # Verifies every module's Compose screenshot goldens against the committed
        # baseline. Deterministic across machines because JvmTestConventionPlugin pins
        # the test JVM to UTC + en-US. The library modules expose verifyRoborazziDebug;
        # :app is flavored, so use the github variant (screens are flavor-agnostic). On
        # a diff, regenerate with `./gradlew recordRoborazziDebug :app:recordRoborazziGithubDebug`.
        run: ./gradlew verifyRoborazziDebug :app:verifyRoborazziGithubDebug

      - name: Upload screenshot diffs on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: roborazzi-compare
          path: '**/build/outputs/roborazzi/*_compare.png'
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload coverage to Codecov
        if: ${{ env.HAS_CODECOV == 'true' }}
        env:
          HAS_CODECOV: ${{ secrets.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: build/reports/kover/report.xml
          fail_ci_if_error: false

      - name: SonarCloud analysis
        # Reuses the already-compiled classes + the Kover XML (path configured in
        # the root build.gradle.kts). Skipped when no token (e.g. fork PRs).
        if: ${{ env.HAS_SONAR == 'true' }}
        env:
          HAS_SONAR: ${{ secrets.SONAR_TOKEN != '' }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: ./gradlew sonar --info

      - name: Snyk dependency scan
        # Reuses the configured Gradle project (Android SDK already set up). Reports
        # high-severity dependency CVEs and sends a snapshot to Snyk. Non-blocking
        # for now (|| true) so transitive CVEs don't wall the build; tighten by
        # dropping the `|| true` on `snyk test` once the baseline is triaged.
        if: ${{ env.HAS_SNYK == 'true' }}
        env:
          HAS_SNYK: ${{ secrets.SNYK_TOKEN != '' }}
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          # Pin the exact CLI version: a floating `snyk` runs latest with the
          # SNYK_TOKEN in env, so a compromised release could exfiltrate it. Bump
          # deliberately. Resolve newer versions with `npm view snyk version`.
          npm install -g snyk@1.1305.1
          snyk test --all-sub-projects --severity-threshold=high || true
          snyk monitor --all-sub-projects || true

      - name: Upload APKs
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: github-debug-apks
          path: app/build/outputs/apk/github/debug/*.apk
          # Fail loudly if a path/flavor regression produces no APKs, rather than
          # silently uploading an empty artifact.
          if-no-files-found: error

  secret-scan:
    # GitGuardian secret scanning over the commit range. Independent of the build
    # so it runs in parallel. Needs full history. The token is a repo-level secret
    # (this job has no environment); skipped when absent, e.g. on fork PRs.
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || github.event_name == 'pull_request' }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: GitGuardian scan
        # ggshield auto-detects the push/PR commit range from the GitHub context;
        # it only needs the API key. Skipped when the repo-level token is absent.
        if: ${{ env.HAS_GG == 'true' }}
        uses: GitGuardian/ggshield-action@e42ae2d40419f1b8a1e57445ff756d5fd2db5913 # v1
        env:
          HAS_GG: ${{ secrets.GIT_GUARDIAN_TOKEN != '' }}
          GITGUARDIAN_API_KEY: ${{ secrets.GIT_GUARDIAN_TOKEN }}

  rclone-update-check:
    # Weekly check for a newer rclone release; opens nothing automatically here,
    # just surfaces the latest tag in the job summary for a maintainer to bump.
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Latest rclone release
        run: |
          latest=$(curl --proto "=https" --tlsv1.2 -fsSL https://api.github.com/repos/rclone/rclone/releases/latest | jq -r .tag_name)
          echo "Latest rclone: $latest (pinned: ${RCLONE_VERSION})" >> "$GITHUB_STEP_SUMMARY"
