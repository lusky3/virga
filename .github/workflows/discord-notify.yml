name: Discord Notification

# Mirrors LUSKTECH/lusk.app: fire after the Build/Release workflows finish and
# delegate to the shared org reusable workflow so the embed format stays
# consistent across repos. Decoupling via workflow_run keeps webhook handling
# out of the build/release jobs themselves.
on:
  workflow_run:
    workflows: ['Build', 'Release']
    types: [completed]

# Least privilege: the check-secrets job only echoes a boolean. The notify job
# grants itself the one scope it needs (actions: read) at the job level.
permissions: {}

jobs:
  check-secrets:
    name: Check Secrets
    runs-on: ubuntu-latest
    outputs:
      has-discord: ${{ steps.discord-check.outputs.defined }}
    steps:
      - name: Check DISCORD_WEBHOOK_URL
        id: discord-check
        shell: bash
        env:
          SECRET_VALUE: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ "$SECRET_VALUE" != '' ]; then
            echo "defined=true" >> $GITHUB_OUTPUT
          else
            echo "defined=false" >> $GITHUB_OUTPUT
          fi

  notify:
    needs: [check-secrets]
    if: needs.check-secrets.outputs.has-discord == 'true'
    permissions:
      actions: read
    uses: LUSKTECH/.github/.github/workflows/discord-notify.yml@ef5af9abeb60535244aeae074bd88b9bf1ac2719 # main
    with:
      status: ${{ github.event.workflow_run.conclusion }}
      title: '${{ github.event.workflow_run.name }} — ${{ github.event.workflow_run.conclusion }}'
      description: |
        **Repository:** ${{ github.repository }}
        **Branch:** ${{ github.event.workflow_run.head_branch }}
        **Triggered by:** ${{ github.event.workflow_run.actor.login }}
      url: ${{ github.event.workflow_run.html_url }}
    secrets:
      DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}

  notify-skip-notice:
    needs: [check-secrets]
    if: needs.check-secrets.outputs.has-discord != 'true'
    runs-on: ubuntu-latest
    steps:
      - run: echo "::notice::Discord notification skipped — DISCORD_WEBHOOK_URL secret is not configured."
