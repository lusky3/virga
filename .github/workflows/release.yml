name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag to publish (e.g. v0.2.0)'
        required: true

env:
  RCLONE_VERSION: v1.74.2
  NDK_VERSION: 27.2.12479018

permissions:
  contents: write  # required for creating GitHub Releases

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # The tag commit is what `actions/checkout` lands on for tag pushes.
          # For workflow_dispatch we resolve the tag manually below.
          ref: ${{ inputs.tag || github.ref }}

      # Resolve and *validate* the tag before letting it touch any shell or
      # filesystem path. Without the regex check, a maliciously-crafted tag
      # like `v1.0.0$(curl …)` would be expanded by every downstream `run:`
      # and a tag with `..` would let a release-notes path escape the repo.
      - name: Resolve and validate version
        id: version
        env:
          INPUT_TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          if [[ ! "$INPUT_TAG" =~ ^v[0-9]+(\.[0-9]+){1,2}(-[A-Za-z0-9.]+)?$ ]]; then
            echo "::error::Refusing tag '$INPUT_TAG' — must look like vMAJOR.MINOR(.PATCH)(-suffix)" >&2
            exit 1
          fi
          echo "tag=$INPUT_TAG" >> "$GITHUB_OUTPUT"
          echo "version=${INPUT_TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'

      - name: Set up Android SDK
        # SEC-F2: third-party action pinned to a commit SHA (not a mutable tag).
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3.2.2

      - name: Install NDK
        env:
          NDK_VERSION: ${{ env.NDK_VERSION }}
        run: sdkmanager "ndk;$NDK_VERSION"

      # rclone is expensive to cross-compile (~5 min); cache by version + NDK
      # so repeated runs on the same versions are a no-op.
      - name: Cache rclone build
        uses: actions/cache@v4
        with:
          path: .rclone-build
          key: rclone-${{ env.RCLONE_VERSION }}-ndk${{ env.NDK_VERSION }}

      - name: Build rclone binaries
        run: ./scripts/build-rclone.sh

      - name: Decode release keystore
        # Stored as base64 to keep it out of the repo and yaml-safe.
        # Expected secret names:
        #   RELEASE_KEYSTORE_BASE64 — base64 of the .jks file
        #   RELEASE_KEYSTORE_PASSWORD — keystore password
        #   RELEASE_KEY_ALIAS — key alias inside the store
        #   RELEASE_KEY_PASSWORD — key password
        if: env.HAS_KEYSTORE == 'true'
        env:
          HAS_KEYSTORE: ${{ secrets.RELEASE_KEYSTORE_BASE64 != '' }}
          KEYSTORE_B64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/keystore"
          printf '%s' "$KEYSTORE_B64" | base64 -d > "$RUNNER_TEMP/keystore/release.jks"
          # SEC-F6: only the (non-sensitive) keystore PATH is persisted to the job
          # environment. The keystore/key PASSWORDS are NOT written to $GITHUB_ENV
          # (which is a plaintext file readable by every later step); they are passed
          # directly into the signing step's `env:` from secrets instead.
          echo "RELEASE_KEYSTORE_FILE=$RUNNER_TEMP/keystore/release.jks" >> "$GITHUB_ENV"

      - name: Build FOSS release APKs
        env:
          VIRGA_OAUTH_CLIENT_ID_GDRIVE: ${{ secrets.OAUTH_CLIENT_ID_GDRIVE }}
          VIRGA_OAUTH_CLIENT_ID_ONEDRIVE: ${{ secrets.OAUTH_CLIENT_ID_ONEDRIVE }}
          VIRGA_OAUTH_CLIENT_ID_DROPBOX: ${{ secrets.OAUTH_CLIENT_ID_DROPBOX }}
        run: ./gradlew assembleFossRelease

      - name: Sign release APKs
        # apksigner replaces the placeholder signature AGP puts on unsigned APKs.
        # We skip if no keystore is configured (CI builds for inspection only).
        if: env.RELEASE_KEYSTORE_FILE != ''
        env:
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          apksigner=$(find "$ANDROID_HOME/build-tools" -name apksigner | sort -V | tail -1)
          for apk in app/build/outputs/apk/foss/release/*-unsigned.apk; do
            signed="${apk%-unsigned.apk}.apk"
            "$apksigner" sign \
              --ks "$RELEASE_KEYSTORE_FILE" \
              --ks-pass "pass:$RELEASE_KEYSTORE_PASSWORD" \
              --ks-key-alias "$RELEASE_KEY_ALIAS" \
              --key-pass "pass:$RELEASE_KEY_PASSWORD" \
              --out "$signed" \
              "$apk"
            rm "$apk"
          done
          ls -lh app/build/outputs/apk/foss/release/

      - name: Generate SHA-256 checksums
        run: |
          set -euo pipefail
          cd app/build/outputs/apk/foss/release
          sha256sum *.apk > SHA256SUMS.txt
          cat SHA256SUMS.txt

      # The version-resolution step validated the tag against a strict regex,
      # so it is safe to use here in derived paths and release metadata.
      - name: Locate release notes
        id: notes
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          path="docs/release/${TAG}.md"
          if [[ -f "$path" ]]; then
            echo "path=$path" >> "$GITHUB_OUTPUT"
          else
            echo "path=" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        # SEC-F2: third-party action pinned to a commit SHA (not a mutable tag).
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Virga ${{ steps.version.outputs.version }}
          body_path: ${{ steps.notes.outputs.path }}
          generate_release_notes: true
          files: |
            app/build/outputs/apk/foss/release/*.apk
            app/build/outputs/apk/foss/release/SHA256SUMS.txt
          fail_on_unmatched_files: true
