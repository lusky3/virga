name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag to publish (e.g. v0.2.0)'
        required: true

# RCLONE_VERSION / NDK_VERSION are NOT hardcoded here — they're loaded from
# scripts/rclone-versions.env (single source of truth) into $GITHUB_ENV by the
# "Load rclone versions" step below, so later steps and the cache key resolve them.

permissions:
  contents: write  # required for creating GitHub Releases

jobs:
  release:
    runs-on: ubuntu-latest
    # The real upload keystore + passwords live in the `production` environment's
    # secrets (the `dev` environment holds the debug keystore under the same names).
    # Without this, RELEASE_KEYSTORE_* resolve empty and the build ships unsigned.
    environment: production
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # The tag commit is what `actions/checkout` lands on for tag pushes.
          # For workflow_dispatch we resolve the tag manually below.
          ref: ${{ inputs.tag || github.ref }}

      # Single source of truth: export RCLONE_VERSION / NDK_VERSION so later steps
      # AND the cache key (env.RCLONE_VERSION, env.NDK_VERSION) resolve them.
      - name: Load rclone versions
        # Emit only KEY=VALUE lines — the env file's leading comments have no '='
        # and $GITHUB_ENV rejects any line without one ("Invalid format").
        run: grep -E '^[A-Za-z_][A-Za-z0-9_]*=' scripts/rclone-versions.env >> "$GITHUB_ENV"

      # Verify the Gradle wrapper jar matches a known-good Gradle release before
      # the first ./gradlew runs (defends against a tampered wrapper in the repo).
      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      # Resolve and *validate* the tag before letting it touch any shell or
      # filesystem path. Without the regex check, a maliciously-crafted tag
      # like `v1.0.0$(curl …)` would be expanded by every downstream `run:`
      # and a tag with `..` would let a release-notes path escape the repo.
      - name: Resolve and validate version
        id: version
        env:
          INPUT_TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          if [[ ! "$INPUT_TAG" =~ ^v[0-9]+(\.[0-9]+){1,2}(-[A-Za-z0-9.]+)?$ ]]; then
            echo "::error::Refusing tag '$INPUT_TAG' — must look like vMAJOR.MINOR(.PATCH)(-suffix)" >&2
            exit 1
          fi
          echo "tag=$INPUT_TAG" >> "$GITHUB_OUTPUT"
          echo "version=${INPUT_TAG#v}" >> "$GITHUB_OUTPUT"
          # Derive a monotonic integer versionCode from MAJOR.MINOR.PATCH
          # (suffix stripped): MAJOR*10000 + MINOR*100 + PATCH.
          core="${INPUT_TAG#v}"; core="${core%%-*}"
          IFS='.' read -r MA MI PA <<<"$core"
          echo "code=$(( ${MA:-0} * 10000 + ${MI:-0} * 100 + ${PA:-0} ))" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 21
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          java-version: '21'
          distribution: temurin

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.25.x'

      - name: Set up Android SDK
        # SEC-F2: third-party action pinned to a commit SHA (not a mutable tag).
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3.2.2

      - name: Install NDK
        # NDK_VERSION is in $GITHUB_ENV from the "Load rclone versions" step.
        run: sdkmanager "ndk;${NDK_VERSION}"

      # rclone is expensive to cross-compile (~5 min); cache by version + NDK
      # so repeated runs on the same versions are a no-op.
      - name: Cache rclone build
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            .rclone-build
            core/rclone/src/main/jniLibs
            ~/go/pkg/mod
            ~/.cache/go-build
          key: rclone-${{ env.RCLONE_VERSION }}-ndk${{ env.NDK_VERSION }}

      - name: Build rclone binaries
        run: ./scripts/build-rclone.sh

      # Gate: never publish a tag whose unit tests fail. `test` is the lifecycle
      # task aggregating every module's unit tests; the app has no release-type
      # unit-test task (testBuildType = debug), so the debug-variant unit tests
      # are the authoritative suite — identical logic, run on non-minified classes.
      - name: Unit tests (release gate)
        run: ./gradlew test

      - name: Decode release keystore
        # Stored as base64 to keep it out of the repo and yaml-safe.
        # Expected config:
        #   RELEASE_KEYSTORE_BASE64 (secret) — base64 of the .jks file
        #   RELEASE_KEYSTORE_PASSWORD (secret) — keystore password
        #   RELEASE_KEY_ALIAS (variable) — key alias inside the store (not
        #     sensitive, so stored as an Actions variable, read via vars.*)
        #   RELEASE_KEY_PASSWORD (secret) — key password
        if: env.HAS_KEYSTORE == 'true'
        env:
          HAS_KEYSTORE: ${{ secrets.RELEASE_KEYSTORE_BASE64 != '' }}
          KEYSTORE_B64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/keystore"
          printf '%s' "$KEYSTORE_B64" | base64 -d > "$RUNNER_TEMP/keystore/release.jks"
          # SEC-F6: only the (non-sensitive) keystore PATH is persisted to the job
          # environment. The keystore/key PASSWORDS are NOT written to $GITHUB_ENV
          # (which is a plaintext file readable by every later step); they are
          # passed straight into the build step's `env:` from secrets instead.
          # VIRGA_KEYSTORE_FILE is the env var the Gradle release signingConfig
          # reads (see app/build.gradle.kts), so AGP signs during the build —
          # the single signing path shared with local release builds.
          echo "VIRGA_KEYSTORE_FILE=$RUNNER_TEMP/keystore/release.jks" >> "$GITHUB_ENV"

      - name: Verify signing secrets available
        if: env.HAS_KEYSTORE != 'true'
        env:
          HAS_KEYSTORE: ${{ secrets.RELEASE_KEYSTORE_BASE64 != '' }}
        run: |
          echo "::error::Release signing keystore not configured. Aborting."
          exit 1

      - name: Build FOSS release APKs
        # When the keystore env vars are present, the Gradle signingConfig signs
        # the APKs in-build (no separate apksigner step). Without them (forks /
        # inspection builds) the release variant is simply left unsigned.
        env:
          VIRGA_OAUTH_CLIENT_ID_GDRIVE: ${{ secrets.OAUTH_CLIENT_ID_GDRIVE }}
          VIRGA_OAUTH_CLIENT_ID_ONEDRIVE: ${{ secrets.OAUTH_CLIENT_ID_ONEDRIVE }}
          VIRGA_OAUTH_CLIENT_ID_DROPBOX: ${{ secrets.OAUTH_CLIENT_ID_DROPBOX }}
          VIRGA_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          # Key alias is non-sensitive and stored as an Actions *variable*.
          VIRGA_KEY_ALIAS: ${{ vars.RELEASE_KEY_ALIAS }}
          VIRGA_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
          VIRGA_VERSION_NAME: ${{ steps.version.outputs.version }}
          VIRGA_VERSION_CODE: ${{ steps.version.outputs.code }}
        run: ./gradlew assembleFossRelease

      - name: Build Play release bundle (AAB)
        # Google Play requires an .aab, not APKs. Built from the `play` flavor (which
        # carries the Play-only in-app-update dep and strips MANAGE_EXTERNAL_STORAGE /
        # battery-opt). Signed with the same upload keystore; Play re-signs via Play
        # App Signing. Not attached to the GitHub Release (an .aab isn't installable) —
        # uploaded as a workflow artifact for manual Play Console upload.
        env:
          VIRGA_OAUTH_CLIENT_ID_GDRIVE: ${{ secrets.OAUTH_CLIENT_ID_GDRIVE }}
          VIRGA_OAUTH_CLIENT_ID_ONEDRIVE: ${{ secrets.OAUTH_CLIENT_ID_ONEDRIVE }}
          VIRGA_OAUTH_CLIENT_ID_DROPBOX: ${{ secrets.OAUTH_CLIENT_ID_DROPBOX }}
          VIRGA_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          VIRGA_KEY_ALIAS: ${{ vars.RELEASE_KEY_ALIAS }}
          VIRGA_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
          VIRGA_VERSION_NAME: ${{ steps.version.outputs.version }}
          VIRGA_VERSION_CODE: ${{ steps.version.outputs.code }}
        run: ./gradlew bundlePlayRelease

      - name: Upload Play AAB artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: play-release-aab
          path: app/build/outputs/bundle/playRelease/*.aab
          if-no-files-found: error
          retention-days: 30

      - name: Verify release APKs are signed
        # A tag-triggered release must never publish unsigned APKs. If the
        # signingConfig didn't run (missing keystore secrets), AGP emits
        # *-unsigned.apk — fail loudly instead of shipping them.
        run: |
          set -euo pipefail
          if ls app/build/outputs/apk/foss/release/*-unsigned.apk >/dev/null 2>&1; then
            echo "::error::Unsigned release APKs present — refusing to publish. Configure RELEASE_KEYSTORE_* secrets." >&2
            exit 1
          fi

      - name: Generate SHA-256 checksums
        run: |
          set -euo pipefail
          cd app/build/outputs/apk/foss/release
          sha256sum *.apk > SHA256SUMS.txt
          cat SHA256SUMS.txt

      # The version-resolution step validated the tag against a strict regex,
      # so it is safe to use here in derived paths and release metadata.
      - name: Locate release notes
        id: notes
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          path="docs/release/${TAG}.md"
          if [[ -f "$path" ]]; then
            echo "path=$path" >> "$GITHUB_OUTPUT"
          else
            echo "path=" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        # SEC-F2: third-party action pinned to a commit SHA (not a mutable tag).
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Virga ${{ steps.version.outputs.version }}
          body_path: ${{ steps.notes.outputs.path }}
          generate_release_notes: true
          files: |
            app/build/outputs/apk/foss/release/*.apk
            app/build/outputs/apk/foss/release/SHA256SUMS.txt
          fail_on_unmatched_files: true
