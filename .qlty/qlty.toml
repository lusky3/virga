config_version = "0"

exclude_patterns = [
  "*_min.*",
  "*-min.*",
  "*.min.*",
  "**/.yarn/**",
  "**/*.d.ts",
  "**/assets/**",
  "**/bower_components/**",
  "**/build/**",
  "**/cache/**",
  "**/config/**",
  "**/db/**",
  "**/deps/**",
  "**/dist/**",
  "**/extern/**",
  "**/external/**",
  "**/generated/**",
  "**/Godeps/**",
  "**/gradlew/**",
  "**/mvnw/**",
  "**/node_modules/**",
  "**/protos/**",
  "**/seed/**",
  "**/target/**",
  "**/templates/**",
  "**/testdata/**",
  "**/vendor/**",
]

test_patterns = [
  "**/test/**",
  "**/spec/**",
  "**/*.test.*",
  "**/*.spec.*",
  "**/*_test.*",
  "**/*_spec.*",
  "**/test_*.*",
  "**/spec_*.*",
]

[smells]
mode = "comment"

# Jetpack Compose @Composable functions idiomatically take state + a handful of
# callback lambdas, so qlty's default parameter threshold (>5) flags nearly every
# screen. Raise it to 10 so only the genuinely unwieldy signatures (the 20+ param
# forms) surface; the rest is expected Compose shape, not a smell.
[smells.function_parameters]
threshold = 10

[[source]]
name = "default"
default = true


# Plugin set is trimmed to qlty's *unique* contribution. Linters that duplicate
# tooling already wired into this repo are intentionally omitted to avoid
# double-reporting the same findings on PRs:
#   - ktlint / radarlint-kotlin  -> covered by detekt + ktlint + SonarQube
#   - semgrep                    -> covered by the Semgrep CI/app integration
#   - trufflehog                 -> covered by GitGuardian secret scanning
#   - ripgrep (TODO grep)        -> low signal
# Kept: actionlint + zizmor (GitHub Actions linting/security — nothing else
# covers these) and shellcheck (the build scripts), plus the [smells] engine
# above for duplication/complexity, which is qlty's real value-add here.
[[plugin]]
name = "actionlint"

[[plugin]]
name = "shellcheck"

[[plugin]]
name = "zizmor"
