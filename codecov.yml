# Codecov configuration. Coverage is produced by Kover (JaCoCo-format XML) and
# uploaded in CI; Sonar reads the same report independently and is unaffected by
# anything here.
#
# `ignore` drops files from Codecov's project/patch math. We list only thin
# Android framework entry points whose sole branching logic is already unit-tested
# in isolation (e.g. `isSyncActive`, `MainActivity.readDeepLink`). The remainder is
# Hilt `EntryPointAccessors`, TileService/Activity lifecycle, and detached
# coroutines that can't be exercised by Robolectric unit tests without the full
# Hilt graph (DataStore/WorkManager) — see app/src/test/.../ReadDeepLinkTest.kt for
# the documented rationale. They are covered by manual/instrumentation paths, not
# unit tests, so counting them only penalises the patch with unreachable lines.
ignore:
  # The Compose navigation host: NavDisplay + NavigationSuiteScaffold wiring,
  # transition specs, and the LocalNavigationEventDispatcherOwner bridge that
  # keeps predictive back wired to the activity. Rendering it requires the full
  # Hilt graph (every tab's hiltViewModel) plus a live ComponentActivity, so it
  # can't be exercised by Robolectric unit tests — same limitation as the entry
  # points below. Its pure inputs (navigation state/entry building) are modelled
  # and tested in the :navigation layer.
  - "app/src/main/kotlin/app/lusk/virga/navigation/VirgaNavHost.kt"
  - "app/src/main/kotlin/app/lusk/virga/widget/SyncAllShortcutActivity.kt"
  - "app/src/main/kotlin/app/lusk/virga/widget/SyncTileService.kt"
  # D7c per-task widget: Glance GlanceAppWidget + AppWidget config activity.
  # Their pure logic (resolveTaskWidgetContent/formatTaskStatusLine) and the
  # TaskWidgetConfigViewModel ARE unit-tested; the rest is Glance runtime + the
  # APPWIDGET_CONFIGURE activity lifecycle + a Compose screen, none reachable by
  # unit tests without the full Hilt graph (same limitation as above).
  - "app/src/main/kotlin/app/lusk/virga/widget/TaskWidget.kt"
  - "app/src/main/kotlin/app/lusk/virga/widget/TaskWidgetConfigActivity.kt"
  # B3 event-driven triggers: the persistent foreground service + the
  # FileObserver / ConnectivityManager.NetworkCallback / ACTION_POWER_CONNECTED
  # receiver wiring. The pure predicates (shouldObserveTask/isSafPath), the
  # start/stop lifecycle transitions, the prefs and the Settings section ARE
  # unit-tested; the OS-callback registration and the Service lifecycle need the
  # Android runtime + a live FGS and can't run under Robolectric unit tests.
  - "sync-worker/src/main/kotlin/app/lusk/virga/sync/WatchdogService.kt"
  - "sync-worker/src/main/kotlin/app/lusk/virga/sync/EventTriggerCoordinator.kt"
  - "sync-worker/src/main/kotlin/app/lusk/virga/sync/FolderWatchSet.kt"
  # The rclone RC daemon manager: spawns the `rclone rcd` child process and drains
  # its stderr on a background thread (which feeds stderrLines for on-device OAuth
  # URL scraping). start()'s success path has no process-injection seam, so it can
  # only run with a real subprocess — its binary-missing guard and stop()/teardown
  # ARE unit-tested; the launch + drainer thread need the Android runtime.
  - "core/rclone/src/main/kotlin/app/lusk/virga/core/rclone/daemon/RcloneDaemonManager.kt"
  # The pre-sync source health probe. Its pure decision (preflightFailureMessage), the
  # per-file read-timeout/close mechanic (timedRead, unit-tested via timedReadForTest), and
  # probe()'s short-circuit branches (non-content pass-through, unreadable-tree) ARE
  # unit-tested (SourceHealthCheckTest + SourceHealthCheckProbeTest). What remains — the
  # DocumentFile depth-first tree-walk (firstFiles) and the real SAF sample reads over a
  # populated tree — needs a registered DocumentsProvider / the Android runtime and can't
  # run under Robolectric unit tests, same limitation as LocalStaging's copy paths.
  - "sync-worker/src/main/kotlin/app/lusk/virga/sync/SourceHealthCheck.kt"
